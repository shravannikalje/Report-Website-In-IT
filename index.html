<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharma Reports - Complete System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    h1 {
      color: #333;
      font-size: 28px;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-admin {
      background: #FF6B6B;
      color: white;
    }

    .btn-admin:hover {
      background: #ee5a52;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255,107,107,0.3);
    }

    .btn-view {
      background: #0A66C2;
      color: white;
    }

    .btn-view:hover {
      background: #084fa4;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(10,102,194,0.3);
    }

    .btn-export {
      background: #28a745;
      color: white;
    }

    .btn-export:hover {
      background: #218838;
    }

    .btn-print {
      background: #6c757d;
      color: white;
    }

    .btn-print:hover {
      background: #5a6268;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      overflow-y: auto;
    }

    .modal.show {
      display: block;
    }

    .modal-content {
      background-color: white;
      margin: 5% auto;
      padding: 30px;
      border-radius: 10px;
      width: 95%;
      max-width: 800px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .close:hover {
      color: #000;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .search-section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .search-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 10px;
      align-items: flex-end;
    }

    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transition: all 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .card-header {
      border-bottom: 3px solid #667eea;
      padding-bottom: 12px;
      margin-bottom: 15px;
    }

    .card h2 {
      color: #0A66C2;
      font-size: 20px;
      margin: 0;
    }

    .card-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }

    .field {
      padding: 10px;
      background: #f8f9fa;
      border-radius: 6px;
      border-left: 3px solid #667eea;
    }

    .field-label {
      font-size: 12px;
      color: #666;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .field-value {
      font-size: 15px;
      color: #333;
      font-weight: 500;
    }

    .card-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .card-table th {
      background: #eef6ff;
      padding: 10px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #0A66C2;
      border-bottom: 2px solid #667eea;
    }

    .card-table td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .card-table tr:hover {
      background: #f8f9fa;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn-small {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .btn-edit {
      background: #FFC107;
      color: #000;
    }

    .btn-delete {
      background: #FF6B6B;
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .stat-number {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .login-section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      margin: 20px auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-section h2 {
      color: #333;
      margin-bottom: 20px;
    }

    .password-input {
      margin-bottom: 20px;
    }

    @media print {
      body {
        background: white;
      }
      header, .nav-buttons, .search-section, .btn-print, .btn-small {
        display: none;
      }
      .card {
        page-break-inside: avoid;
      }
    }

    @media (max-width: 768px) {
      .search-row {
        grid-template-columns: 1fr;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
      .reports-grid {
        grid-template-columns: 1fr;
      }
      .card-body {
        grid-template-columns: 1fr;
      }
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .nav-buttons {
        width: 100%;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>📊 Pharma Sampling Reports</h1>
      <div class="nav-buttons">
        <button class="btn btn-admin" onclick="openAdminLogin()">🔐 Admin Panel</button>
        <button class="btn btn-view" onclick="showReports()">📋 View Reports</button>
        <button class="btn btn-export" onclick="exportToCSV()">📥 Export CSV</button>
        <button class="btn btn-print" onclick="window.print()">🖨️ Print</button>
      </div>
    </header>

    <!-- Stats Section -->
    <div class="stats" id="statsSection" style="display:none;">
      <div class="stat-card">
        <div class="stat-number" id="totalReports">0</div>
        <div class="stat-label">Total Reports</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalCompanies">0</div>
        <div class="stat-label">Companies</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalLocations">0</div>
        <div class="stat-label">Locations</div>
      </div>
    </div>

    <!-- Search Section -->
    <div class="search-section" id="searchSection" style="display:none;">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="🔍 Search by Company, Location, or Document No..." onkeyup="filterReports()">
        <input type="text" id="dateFilterStart" placeholder="From Date" onfocus="this.type='date'" onchange="filterReports()">
        <input type="text" id="dateFilterEnd" placeholder="To Date" onfocus="this.type='date'" onchange="filterReports()">
      </div>
    </div>

    <!-- Reports Display -->
    <div id="reportsContainer"></div>
  </div>

  <!-- Admin Login Modal -->
  <div id="adminLoginModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
      <span class="close" onclick="closeModal('adminLoginModal')">&times;</span>
      <div class="login-section">
        <h2>🔐 Admin Login</h2>
        <div class="form-group password-input">
          <label>Password</label>
          <input type="password" id="adminPassword" placeholder="Enter Admin Password" onkeypress="if(event.key==='Enter') checkAdminPass()">
        </div>
        <button class="btn-submit" onclick="checkAdminPass()">Login</button>
      </div>
    </div>
  </div>

  <!-- Admin Panel Modal -->
  <div id="adminPanelModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('adminPanelModal')">&times;</span>
      <h2>➕ Add New Sampling Report</h2>
      <form id="reportForm" onsubmit="saveReport(event)">
        
        <h3 style="margin-top:20px; color:#333; border-bottom:2px solid #667eea; padding-bottom:10px;">📋 Basic Information</h3>
        
        <div class="form-row">
          <div class="form-group">
            <label>Company Name *</label>
            <input type="text" id="company" required>
          </div>
          <div class="form-group">
            <label>Location *</label>
            <input type="text" id="location" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Document No *</label>
            <input type="text" id="docNo" required>
          </div>
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="date" required>
          </div>
        </div>

        <h3 style="margin-top:20px; color:#333; border-bottom:2px solid #667eea; padding-bottom:10px;">🔧 Equipment & Sampling Details</h3>

        <div class="form-row">
          <div class="form-group">
            <label>Equipment</label>
            <input type="text" id="equipment">
          </div>
          <div class="form-group">
            <label>Room ID</label>
            <input type="text" id="room">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Sample Media</label>
            <input type="text" id="media">
          </div>
          <div class="form-group">
            <label>Batch Size</label>
            <input type="text" id="batch">
          </div>
        </div>

        <h3 style="margin-top:20px; color:#333; border-bottom:2px solid #667eea; padding-bottom:10px;">🧪 Containment Sampling Details</h3>

        <div class="form-row">
          <div class="form-group">
            <label>Surrogate Material</label>
            <input type="text" id="surrogate">
          </div>
          <div class="form-group">
            <label>PPE/RPE Worn</label>
            <input type="text" id="ppe">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Blank Sample ID</label>
            <input type="text" id="blankSample">
          </div>
          <div class="form-group">
            <label>Sampling Time</label>
            <input type="text" id="samplingTime" placeholder="e.g., 15:30 - 16:00">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Pump ID</label>
            <input type="text" id="pumpId">
          </div>
          <div class="form-group">
            <label>Cycle Iteration 1 (Start)</label>
            <input type="time" id="iter1Start">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Cycle Iteration 1 (End)</label>
            <input type="time" id="iter1End">
          </div>
          <div class="form-group">
            <label>Cycle Iteration 2 (Start)</label>
            <input type="time" id="iter2Start">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Cycle Iteration 2 (End)</label>
            <input type="time" id="iter2End">
          </div>
          <div class="form-group">
            <label>Cycle Iteration 3 (Start)</label>
            <input type="time" id="iter3Start">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Cycle Iteration 3 (End)</label>
            <input type="time" id="iter3End">
          </div>
        </div>

        <h3 style="margin-top:20px; color:#333; border-bottom:2px solid #667eea; padding-bottom:10px;">🌡️ Environmental Parameters</h3>

        <div class="form-row">
          <div class="form-group">
            <label>Temperature Range</label>
            <input type="text" id="tempRange" placeholder="e.g., 20-25°C">
          </div>
          <div class="form-group">
            <label>Relative Humidity</label>
            <input type="text" id="humidity" placeholder="e.g., 45-55%">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>ACPH (Air Changes Per Hour)</label>
            <input type="text" id="acph">
          </div>
          <div class="form-group">
            <label>Room Pressure (MMWC)</label>
            <input type="text" id="roomPressure">
          </div>
        </div>

        <h3 style="margin-top:20px; color:#333; border-bottom:2px solid #667eea; padding-bottom:10px;">✍️ Authorization</h3>

        <div class="form-row">
          <div class="form-group">
            <label>Signature Name</label>
            <input type="text" id="signatureName">
          </div>
          <div class="form-group">
            <label>Signature Date</label>
            <input type="date" id="signatureDate">
          </div>
        </div>

        <div class="form-group full">
          <label>Additional Remarks</label>
          <textarea id="remarks" placeholder="Any additional notes or remarks..."></textarea>
        </div>

        <button type="submit" class="btn-submit">💾 Save Report</button>
      </form>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "admin123";

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      loadReports();
      showReports();
    });

    // Open Admin Login
    function openAdminLogin() {
      document.getElementById('adminLoginModal').classList.add('show');
      document.getElementById('adminPassword').focus();
    }

    // Check Admin Password
    function checkAdminPass() {
      const password = document.getElementById('adminPassword').value;
      if(password === ADMIN_PASSWORD) {
        closeModal('adminLoginModal');
        document.getElementById('reportForm').reset();
        document.getElementById('adminPanelModal').classList.add('show');
        document.getElementById('adminPassword').value = '';
      } else {
        alert('❌ Wrong Password!');
        document.getElementById('adminPassword').value = '';
      }
    }

    // Save Report
    function saveReport(e) {
      e.preventDefault();
      
      const report = {
        id: Date.now(),
        company: document.getElementById('company').value,
        location: document.getElementById('location').value,
        docNo: document.getElementById('docNo').value,
        date: document.getElementById('date').value,
        equipment: document.getElementById('equipment').value,
        room: document.getElementById('room').value,
        media: document.getElementById('media').value,
        batch: document.getElementById('batch').value,
        surrogate: document.getElementById('surrogate').value,
        ppe: document.getElementById('ppe').value,
        blankSample: document.getElementById('blankSample').value,
        samplingTime: document.getElementById('samplingTime').value,
        pumpId: document.getElementById('pumpId').value,
        iter1Start: document.getElementById('iter1Start').value,
        iter1End: document.getElementById('iter1End').value,
        iter2Start: document.getElementById('iter2Start').value,
        iter2End: document.getElementById('iter2End').value,
        iter3Start: document.getElementById('iter3Start').value,
        iter3End: document.getElementById('iter3End').value,
        tempRange: document.getElementById('tempRange').value,
        humidity: document.getElementById('humidity').value,
        acph: document.getElementById('acph').value,
        roomPressure: document.getElementById('roomPressure').value,
        signatureName: document.getElementById('signatureName').value,
        signatureDate: document.getElementById('signatureDate').value,
        remarks: document.getElementById('remarks').value,
        createdAt: new Date().toLocaleString()
      };

      let reports = JSON.parse(localStorage.getItem('samplingReports')) || [];
      reports.push(report);
      localStorage.setItem('samplingReports', JSON.stringify(reports));

      alert('✅ Report saved successfully!');
      document.getElementById('reportForm').reset();
      closeModal('adminPanelModal');
      loadReports();
      showReports();
    }

    // Load and Display Reports
    function loadReports() {
      const reports = JSON.parse(localStorage.getItem('samplingReports')) || [];
      updateStats(reports);
      displayReports(reports);
    }

    // Display Reports
    function displayReports(reports) {
      const container = document.getElementById('reportsContainer');
      
      if(reports.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>No reports available yet. Create one from the Admin Panel!</p>
          </div>
        `;
        return;
      }

      let html = '<div class="reports-grid">';
      reports.forEach(report => {
        html += `
          <div class="card">
            <div class="card-header">
              <h2>${report.company}</h2>
            </div>
            <div class="card-body">
              <div class="field">
                <div class="field-label">Location</div>
                <div class="field-value">${report.location}</div>
              </div>
              <div class="field">
                <div class="field-label">Document No</div>
                <div class="field-value">${report.docNo}</div>
              </div>
              <div class="field">
                <div class="field-label">Date</div>
                <div class="field-value">${report.date}</div>
              </div>
              <div class="field">
                <div class="field-label">Equipment</div>
                <div class="field-value">${report.equipment || '-'}</div>
              </div>
              <div class="field">
                <div class="field-label">Room ID</div>
                <div class="field-value">${report.room || '-'}</div>
              </div>
              <div class="field">
                <div class="field-label">Batch Size</div>
                <div class="field-value">${report.batch || '-'}</div>
              </div>
            </div>

            <table class="card-table">
              <tr>
                <th>Parameter</th>
                <th>Value</th>
              </tr>
              <tr>
                <td>Sample Media</td>
                <td>${report.media || '-'}</td>
              </tr>
              <tr>
                <td>Surrogate Material</td>
                <td>${report.surrogate || '-'}</td>
              </tr>
              <tr>
                <td>PPE/RPE Worn</td>
                <td>${report.ppe || '-'}</td>
              </tr>
              <tr>
                <td>Blank Sample ID</td>
                <td>${report.blankSample || '-'}</td>
              </tr>
              <tr>
                <td>Sampling Time</td>
                <td>${report.samplingTime || '-'}</td>
              </tr>
              <tr>
                <td>Pump ID</td>
                <td>${report.pumpId || '-'}</td>
              </tr>
              <tr>
                <td>Temperature Range</td>
                <td>${report.tempRange || '-'}</td>
              </tr>
              <tr>
                <td>Relative Humidity</td>
                <td>${report.humidity || '-'}</td>
              </tr>
              <tr>
                <td>ACPH</td>
                <td>${report.acph || '-'}</td>
              </tr>
              <tr>
                <td>Room Pressure (MMWC)</td>
                <td>${report.roomPressure || '-'}</td>
              </tr>
              <tr>
                <td>Signature Name</td>
                <td>${report.signatureName || '-'}</td>
              </tr>
              <tr>
                <td>Created</td>
                <td>${report.createdAt}</td>
              </tr>
            </table>

            ${report.remarks ? `<div style="margin-top:15px; padding:10px; background:#fff3cd; border-left:3px solid #ffc107; border-radius:6px;"><strong>📝 Remarks:</strong> ${report.remarks}</div>` : ''}

            <div class="card-actions">
              <button class="btn-small btn-edit" onclick="editReport(${report.id})">✏️ Edit</button>
              <button class="btn-small btn-delete" onclick="deleteReport(${report.id})">🗑️ Delete</button>
            </div>
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    // Filter Reports
    function filterReports() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const dateStart = document.getElementById('dateFilterStart').value;
      const dateEnd = document.getElementById('dateFilterEnd').value;
      
      let reports = JSON.parse(localStorage.getItem('samplingReports')) || [];
      
      reports = reports.filter(r => {
        const matchSearch = r.company.toLowerCase().includes(search) || 
                           r.location.toLowerCase().includes(search) ||
                           r.docNo.toLowerCase().includes(search);
        
        const matchDate = (!dateStart || r.date >= dateStart) && (!dateEnd || r.date <= dateEnd);
        
        return matchSearch && matchDate;
      });
      
      displayReports(reports);
    }

    // Delete Report
    function deleteReport(id) {
      if(confirm('Are you sure you want to delete this report? ⚠️')) {
        let reports = JSON.parse(localStorage.getItem('samplingReports')) || [];
        reports = reports.filter(r => r.id !== id);
        localStorage.setItem('samplingReports', JSON.stringify(reports));
        loadReports();
      }
    }

    // Export to CSV
    function exportToCSV() {
      const reports = JSON.parse(localStorage.getItem('samplingReports')) || [];
      
      if(reports.length === 0) {
        alert('No reports to export!');
        return;
      }

      const headers = ['Company', 'Location', 'Document No', 'Date', 'Equipment', 'Room', 'Batch Size', 'Sample Media', 'Temperature Range', 'Humidity', 'ACPH', 'Room Pressure', 'Signature Name', 'Created At'];
      
      let csv = headers.join(',') + '\n';
      
      reports.forEach(r => {
        const row = [
          `"${r.company}"`,
          `"${r.location}"`,
          `"${r.docNo}"`,
          r.date,
          `"${r.equipment || ''}"`,
          `"${r.room || ''}"`,
          `"${r.batch || ''}"`,
          `"${r.media || ''}"`,
          `"${r.tempRange || ''}"`,
          `"${r.humidity || ''}"`,
          `"${r.acph || ''}"`,
          `"${r.roomPressure || ''}"`,
          `"${r.signatureName || ''}"`,
          `"${r.createdAt}"`
        ];
        csv += row.join(',') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Pharma_Reports_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    // Show Reports View
    function showReports() {
      document.getElementById('statsSection').style.display = 'grid';
      document.getElementById('searchSection').style.display = 'block';
      loadReports();
    }

    // Update Stats
    function updateStats(reports) {
      document.getElementById('totalReports').textContent = reports.length;
      
      const companies = new Set(reports.map(r => r.company)).size;
      document.getElementById('totalCompanies').textContent = companies;
      
      const locations = new Set(reports.map(r => r.location)).size;
      document.getElementById('totalLocations').textContent = locations;
    }

    // Modal Functions
    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('show');
    }

    window.onclick = function(event) {
      if(event.target.classList.contains('modal')) {
        event.target.classList.remove('show');
      }
    }
  </script>
</body>
</html>
